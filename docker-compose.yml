services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: doc-chatbot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: doc_chatbot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1234"
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d doc_chatbot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
